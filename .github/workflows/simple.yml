name: My first example

on:
  push:
    branches:
      - main
      - test


jobs:
  simple-example:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Print some stuff
        run: echo "This is my very first github action"

      - name: Run some random commands
        run: |
          whoami
          hostname
          echo "${{ secrets.SUPER_SECRET_PASS }}"
          echo "Trying to open the file..."
          cat example.txt
